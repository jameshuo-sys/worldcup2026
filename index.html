<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 FIFA World Cup 世界盃賽程</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #080b12;
  --surface:  #0c1018;
  --card:     #0f1520;
  --card2:    #121926;
  --border:   #1a2535;
  --border2:  #243245;
  --gold:     #d9b779;
  --gold-lt:  #ecd49a;
  --gold-dk:  #8a6e35;
  --gold-glow:#d9b77918;
  --green:    #34d399;
  --red:      #f87171;
  --text:     #dde4f0;
  --text2:    #8a97b0;
  --text3:    #4a5568;
  --pill:     #111827;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', 'Noto Sans TC', sans-serif;
  font-size: 15px;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── HERO ─────────────────────────── */
.hero {
  position: relative;
  min-height: 320px;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  background: #060810;
}
/* deep background gradient */
.hero-bg {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 70% 60% at 50% 40%, #0d1a2e 0%, transparent 65%),
    linear-gradient(160deg, #060810 0%, #0b1322 50%, #06080e 100%);
}
/* geometric pattern overlay */
.hero-pattern {
  position: absolute;
  inset: 0;
  z-index: 1;
  pointer-events: none;
  opacity: 0.12;
}
/* gold top line */
.hero::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold-dk) 30%, var(--gold) 50%, var(--gold-dk) 70%, transparent);
  z-index: 3;
}
/* gold bottom line */
.hero::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold-dk) 30%, var(--gold) 50%, var(--gold-dk) 70%, transparent);
  z-index: 3;
}
/* gold ribbon wave */

/* centered content wrapper matching container width */
.hero-inner {
  position: relative;
  z-index: 4;
  width: 100%;
  max-width: 1280px;
  padding: 52px 20px;
}

/* text — left aligned inside centered wrapper */
.hero-content {
  max-width: 580px;
}
.hero-eyebrow {
  font-size: 10px;
  letter-spacing: 5px;
  text-transform: uppercase;
  color: var(--gold);
  font-weight: 500;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.hero-eyebrow::before {
  content: '';
  width: 32px; height: 1px;
  background: var(--gold);
  display: inline-block;
}
.hero h1 {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 300;
  font-size: clamp(52px, 7vw, 96px);
  letter-spacing: 8px;
  line-height: 0.95;
  color: var(--text);
  margin-bottom: 6px;
}
.hero h1 em {
  font-style: normal;
  color: var(--gold-lt);
  display: block;
}
.hero-divider {
  display: flex;
  align-items: center;
  gap: 14px;
  margin: 20px 0 18px;
  max-width: 280px;
}
.hero-divider-line {
  flex: 1; height: 1px;
  background: linear-gradient(90deg, var(--gold-dk), transparent);
}
.hero-divider-diamond {
  width: 5px; height: 5px;
  border: 1px solid var(--gold);
  transform: rotate(45deg);
  flex-shrink: 0;
}
.hero-sub {
  color: var(--text2);
  font-size: 12px;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 24px;
}
.hero-actions {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 10px;
}
.live-pill {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  border: 1px solid #f8717140;
  background: #f8717108;
  color: var(--red);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 2px;
  padding: 5px 14px;
  border-radius: 2px;
  text-transform: uppercase;
}
.live-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--red);
  animation: blink 1.4s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

.notify-btn {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  border: 1px solid var(--border2);
  background: none;
  color: var(--text2);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 1.5px;
  padding: 5px 14px;
  border-radius: 2px;
  text-transform: uppercase;
  cursor: pointer;
  font-family: inherit;
  transition: all .2s;
}
.notify-btn:hover { border-color: var(--gold-dk); color: var(--gold-lt); }
.notify-btn.active {
  border-color: var(--gold);
  background: var(--gold-glow);
  color: var(--gold-lt);
}

/* responsive hero */
@media (max-width: 640px) {
  .hero { min-height: 240px; }
  .hero-inner { padding: 36px 20px; }
  .hero h1 { font-size: clamp(44px, 13vw, 68px); letter-spacing: 4px; }
}

/* ── LAYOUT ─────────────────────────── */
.container { max-width: 1280px; margin: 0 auto; padding: 36px 20px 80px; }

/* ── TABS ─────────────────────────── */
.tabs-row {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 32px;
  border-bottom: 1px solid var(--border);
}
.tabs {
  display: flex;
  gap: 0;
}
.tab {
  flex-shrink: 0;
  padding: 12px 24px;
  border: none;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  background: none;
  color: var(--text2);
  font-size: 13px;
  font-weight: 500;
  letter-spacing: .5px;
  cursor: pointer;
  transition: all .2s;
  white-space: nowrap;
  font-family: 'Inter', 'Noto Sans TC', sans-serif;
}
.tab:hover { color: var(--text); }
.tab.active {
  color: var(--gold-lt);
  border-bottom-color: var(--gold);
}

/* ── STATUS BAR ─────────────────────────── */
.status-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
  gap: 12px;
  flex-wrap: wrap;
}
.update-time { color: var(--text3); font-size: 11px; letter-spacing: .5px; }
.refresh-btn {
  display: flex; align-items: center; gap: 7px;
  background: none;
  border: 1px solid var(--border2);
  color: var(--text2);
  font-size: 11px;
  font-weight: 500;
  font-family: inherit;
  padding: 6px 16px;
  border-radius: 2px;
  cursor: pointer;
  transition: all .2s;
  letter-spacing: .5px;
}
.next-match-btn {
  display: flex; align-items: center; gap: 7px;
  background: none;
  border: 1px solid var(--gold-dk);
  color: var(--gold-lt);
  font-size: 11px;
  font-weight: 500;
  font-family: inherit;
  padding: 6px 16px;
  border-radius: 2px;
  cursor: pointer;
  transition: all .2s;
  letter-spacing: .5px;
  margin-bottom: 6px;
  white-space: nowrap;
}
.next-match-btn:hover { background: var(--gold-dk); color: #fff; }
.refresh-btn.spinning svg { animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── DATE LABEL ─────────────────────────── */
.date-section { margin-top: 36px; }
.date-section:first-child { margin-top: 0; }

.section-label {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 14px;
}
.section-label-text {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--gold);
  white-space: nowrap;
}
.section-label-line {
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, var(--gold-dk) 0%, transparent 100%);
}

/* ── MATCH CARD ─────────────────────────── */
.matches-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
  gap: 10px;
}

.match-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 18px 20px;
  transition: border-color .25s, background .25s;
  position: relative;
  overflow: hidden;
}
.match-card:hover {
  border-color: var(--border2);
  background: var(--card2);
}
.match-card.live-card {
  border-color: #f8717130;
  background: linear-gradient(135deg, #0f1520, #1a0e0e);
}
.match-card.live-card::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent 10%, var(--red) 50%, transparent 90%);
}
.match-card.final-card {
  border-color: #d9b77920;
}
.match-card.final-card::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent 10%, var(--gold-dk) 50%, transparent 90%);
}

.card-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}
.group-tag {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 1.5px;
  color: var(--text3);
  text-transform: uppercase;
  max-width: 55%;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.match-status {
  font-size: 10px;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 1px;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.status-live  { background: #f8717115; color: var(--red);   border: 1px solid #f8717135; }
.status-ft    { background: #34d39915; color: var(--green); border: 1px solid #34d39930; }
.status-sched { background: transparent; color: var(--text3); border: 1px solid var(--border); }

/* teams */
.teams-row {
  display: flex;
  align-items: center;
  gap: 8px;
}
.team {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  min-width: 0;
}

/* flag image – always use img, not emoji */
.team-flag-wrap {
  width: 44px; height: 32px;
  border-radius: 2px;
  overflow: hidden;
  border: 1px solid var(--border2);
  flex-shrink: 0;
  background: var(--border);
  display: flex; align-items: center; justify-content: center;
}
.team-flag-wrap img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
}
.team-flag-wrap .flag-fallback {
  font-size: 22px;
  line-height: 1;
}

.team-name-en {
  font-size: 13px;
  font-weight: 600;
  text-align: center;
  color: var(--text);
  line-height: 1.2;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 100%;
}
.team-name-zh {
  font-size: 11px;
  font-weight: 400;
  text-align: center;
  color: var(--text2);
  line-height: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 100%;
  font-family: 'Noto Sans TC', sans-serif;
}

.score-box {
  display: flex;
  align-items: center;
  gap: 4px;
  flex-shrink: 0;
  min-width: 90px;
  justify-content: center;
}
.score {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 300;
  font-size: 48px;
  letter-spacing: 2px;
  line-height: 1;
  color: var(--text);
  min-width: 32px;
  text-align: center;
}
.score-sep {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 300;
  font-size: 30px;
  color: var(--text3);
  line-height: 1;
}
.score-tbd {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 300;
  font-size: 22px;
  color: var(--text3);
  letter-spacing: 4px;
}

.card-bottom {
  margin-top: 14px;
  padding-top: 12px;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}
.match-time { font-size: 12px; color: var(--text2); letter-spacing: .5px; }
.match-venue {
  font-size: 11px;
  color: var(--text3);
  text-align: right;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 55%;
}

/* ── STANDINGS ─────────────────────────── */
.standings-container { overflow-x: auto; }
.standings-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
  margin-bottom: 32px;
}
.standings-table th {
  background: var(--surface);
  color: var(--text3);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 10px 14px;
  text-align: center;
  border-bottom: 1px solid var(--border);
}
.standings-table th:first-child { text-align: left; }
.standings-table td {
  padding: 11px 14px;
  border-bottom: 1px solid var(--border);
  text-align: center;
  color: var(--text2);
}
.standings-table td:first-child { text-align: left; }
.standings-table tbody tr:hover td { background: var(--card); }
.qualify-row td:first-child  { border-left: 2px solid var(--green); }
.qualify3-row td:first-child { border-left: 2px solid var(--gold); }
.rank-num { color: var(--text3); font-size: 11px; width: 18px; display: inline-block; text-align: center; }
.team-cell { display: flex; align-items: center; gap: 10px; }
.cell-flag {
  width: 28px; height: 20px;
  border-radius: 1px;
  overflow: hidden;
  border: 1px solid var(--border2);
  flex-shrink: 0;
  background: var(--border);
}
.cell-flag img { width: 100%; height: 100%; object-fit: cover; display: block; }
.team-name-cell { display: flex; flex-direction: column; gap: 1px; }
.cell-en { font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; }
.cell-zh { font-size: 11px; color: var(--text3); font-family: 'Noto Sans TC', sans-serif; white-space: nowrap; }
.pts-cell { font-weight: 700; color: var(--gold-lt); font-size: 14px; }
.gd-pos { color: var(--green); }
.gd-neg { color: var(--red); }

/* ── LOADER ─────────────────────────── */
.loader {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; padding: 72px 20px; gap: 16px; color: var(--text2);
  font-size: 13px; letter-spacing: .5px;
}
.spinner {
  width: 32px; height: 32px;
  border: 1px solid var(--border2);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin .9s linear infinite;
}

/* ── FOOTER ─────────────────────────── */
footer {
  text-align: center;
  padding: 28px;
  color: var(--text3);
  font-size: 10px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  border-top: 1px solid var(--border);
}

/* ── RESPONSIVE ─────────────────────────── */
@media (max-width: 520px) {
  .matches-grid { grid-template-columns: 1fr; }
  .score { font-size: 36px; }
  .hero h1 { letter-spacing: 3px; }
  .tab { padding: 10px 14px; font-size: 12px; }
}
</style>
</head>
<body>

<div class="hero">
  <div class="hero-bg"></div>

  <!-- geometric cube/herringbone pattern (sparse, not filled) -->
  <svg class="hero-pattern" viewBox="0 0 120 104" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <pattern id="cubepat" x="0" y="0" width="96" height="83.2" patternUnits="userSpaceOnUse">
        <!-- isometric cube pattern: 3 rhombus faces -->
        <!-- top face -->
        <polygon points="48,0 96,24 48,48 0,24" fill="none" stroke="#d9b779" stroke-width="0.5"/>
        <!-- left face -->
        <polygon points="0,24 48,48 48,83.2 0,59.2" fill="none" stroke="#d9b779" stroke-width="0.5"/>
        <!-- right face -->
        <polygon points="96,24 48,48 48,83.2 96,59.2" fill="none" stroke="#d9b779" stroke-width="0.5"/>
        <!-- internal lines top face -->
        <line x1="48" y1="0" x2="48" y2="48" stroke="#d9b779" stroke-width="0.3" opacity="0.5"/>
        <line x1="0" y1="24" x2="96" y2="24" stroke="#d9b779" stroke-width="0.3" opacity="0.5"/>
        <!-- internal lines left face -->
        <line x1="0" y1="41.6" x2="48" y2="65.6" stroke="#d9b779" stroke-width="0.3" opacity="0.5"/>
        <line x1="0" y1="59.2" x2="24" y2="48" stroke="#d9b779" stroke-width="0.3" opacity="0.5"/>
        <!-- internal lines right face -->
        <line x1="96" y1="41.6" x2="48" y2="65.6" stroke="#d9b779" stroke-width="0.3" opacity="0.5"/>
        <line x1="96" y1="59.2" x2="72" y2="48" stroke="#d9b779" stroke-width="0.3" opacity="0.5"/>
      </pattern>
      <!-- fade mask: bright center, dark edges -->
      <radialGradient id="pmask" cx="50%" cy="50%" r="55%">
        <stop offset="0%" stop-color="white" stop-opacity="1"/>
        <stop offset="60%" stop-color="white" stop-opacity="0.3"/>
        <stop offset="100%" stop-color="white" stop-opacity="0"/>
      </radialGradient>
      <mask id="pm"><rect width="100%" height="100%" fill="url(#pmask)"/></mask>
    </defs>
    <rect width="100%" height="100%" fill="url(#cubepat)" mask="url(#pm)"/>
  </svg>

  <!-- centered wrapper (same max-width as .container) -->
  <div class="hero-inner">
    <div class="hero-content">
      <div class="hero-eyebrow">FIFA World Cup™</div>
      <h1>WORLD CUP<em>2026</em></h1>
      <div class="hero-divider">
        <div class="hero-divider-line"></div>
        <div class="hero-divider-diamond"></div>
      </div>
      <div class="hero-sub">Canada · Mexico · United States &nbsp;｜&nbsp; 11 Jun – 19 Jul</div>
      <div class="hero-actions">
        <span class="live-pill"><span class="live-dot"></span>即時賽果自動更新</span>
        <button class="notify-btn" id="notify-btn" onclick="toggleNotifications()">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 01-3.46 0"/>
          </svg>
          <span id="notify-label">開啟比賽推播</span>
        </button>
      </div>
    </div>
  </div>
</div>

<div class="container">
  <div class="tabs-row">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('matches')">賽程 &amp; 賽果</button>
      <button class="tab" onclick="switchTab('standings')">積分榜</button>
      <button class="tab" onclick="switchTab('bracket')">淘汰賽</button>
    </div>
    <button class="next-match-btn" onclick="jumpToNextMatch()" title="跳到最近待賽場次">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
      </svg>
      最近場次
    </button>
  </div>

  <div id="tab-matches">
    <div class="status-bar">
      <div class="update-time" id="update-time">載入中…</div>
      <button class="refresh-btn" id="refresh-btn" onclick="loadMatches(true)">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M23 4v6h-6M1 20v-6h6"/>
          <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
        </svg>
        手動刷新
      </button>
    </div>
    <div id="matches-content"><div class="loader"><div class="spinner"></div>載入賽程資料…</div></div>
  </div>

  <div id="tab-standings" style="display:none">
    <div id="standings-content"><div class="loader"><div class="spinner"></div>載入積分榜…</div></div>
  </div>

  <div id="tab-bracket" style="display:none">
    <div id="bracket-content"><div class="loader"><div class="spinner"></div>載入淘汰賽資料…</div></div>
  </div>
</div>

<footer>資料來源 ESPN API &nbsp;·&nbsp; 每 60 秒自動更新 &nbsp;·&nbsp; 2026 FIFA World Cup</footer>

<script>
// ── CONFIG ──────────────────────────────────────────────
const ESPN_SCORES    = 'https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard';
const ESPN_STANDINGS = 'https://site.api.espn.com/apis/v2/sports/soccer/fifa.world/standings';
const REFRESH_MS     = 60000;

let allEvents   = [];
let refreshTimer = null;

// ── TEAM DATA: zh name + flag code ──────────────────────
const TEAM_DATA = {
  'Mexico':               { zh: '墨西哥',   code: 'mx' },
  'South Africa':         { zh: '南非',     code: 'za' },
  'South Korea':          { zh: '南韓',     code: 'kr' },
  'Korea Republic':       { zh: '南韓',     code: 'kr' },
  'Czech Republic':       { zh: '捷克',     code: 'cz' },

function flagImg(name, code, size = 'card') {

// ── STATUS PARSING ────────────────────────────────────────
// ESPN status types that mean the match is finished
const FINAL_STATUSES = new Set([
  'STATUS_FINAL', 'STATUS_FULL_TIME', 'STATUS_FINAL_AET',
  'STATUS_FINAL_PEN', 'post', 'STATUS_POSTPONED'
]);
const LIVE_STATUSES = new Set([
  'STATUS_IN_PROGRESS', 'STATUS_HALFTIME', 'in', 'live'
]);

// ── NOTIFICATIONS ────────────────────────────────────────
const NOTIFY_KEY = 'wc2026_notify_enabled';
let notifyEnabled = false;
// snapshot of previous match states, keyed by event id
// { status: 'live'|'final'|'sched', homeScore, awayScore }
let prevMatchState = {};

function initNotifications() {
  notifyEnabled = (sessionStorage.getItem(NOTIFY_KEY) === '1')
    && ('Notification' in window) && Notification.permission === 'granted';
  updateNotifyBtn();
}

function updateNotifyBtn() {
  const btn = document.getElementById('notify-btn');
  const label = document.getElementById('notify-label');
  if (!btn) return;
  if (notifyEnabled) {
    btn.classList.add('active');
    label.textContent = '推播已開啟';
  } else {
    btn.classList.remove('active');
    label.textContent = '開啟比賽推播';
  }
}

async function toggleNotifications() {
  if (!('Notification' in window)) {
    alert('您的瀏覽器不支援通知功能');
    return;
  }

  if (notifyEnabled) {
    notifyEnabled = false;
    sessionStorage.setItem(NOTIFY_KEY, '0');
    updateNotifyBtn();
    return;
  }

  let perm = Notification.permission;
  if (perm === 'default') {
    perm = await Notification.requestPermission();
  }

  if (perm === 'granted') {
    notifyEnabled = true;
    sessionStorage.setItem(NOTIFY_KEY, '1');
    new Notification('世界盃賽果推播已開啟', {
      body: '開賽、完場、進球時將會通知您（請保持此頁面開啟）',
      icon: 'https://flagcdn.com/w40/us.png'
    });
  } else {
    alert('請允許瀏覽器通知權限以使用此功能');
  }
  updateNotifyBtn();
}

function sendNotification(title, body) {
  if (!notifyEnabled || !('Notification' in window) || Notification.permission !== 'granted') return;
  try {
    new Notification(title, { body, icon: 'https://flagcdn.com/w40/us.png' });
  } catch(e) { /* ignore */ }
}

function matchLabel(home, away) {
  const hi = teamInfo(home), ai = teamInfo(away);
  const hLabel = hi.zh ? `${home}(${hi.zh})` : home;
  const aLabel = ai.zh ? `${away}(${ai.zh})` : away;
  return `${hLabel} vs ${aLabel}`;
}

// Compare current events against previous snapshot, fire notifications, update snapshot
function detectChangesAndNotify(events) {
  const isFirstLoad = Object.keys(prevMatchState).length === 0;
  const nextState = {};

  for (const ev of events) {
    const comp = ev.competitions?.[0];
    if (!comp) continue;
    const home = comp.competitors?.find(c=>c.homeAway==='home') || comp.competitors?.[0];
    const away = comp.competitors?.find(c=>c.homeAway==='away') || comp.competitors?.[1];
    if (!home||!away) continue;

    const homeName = home.team?.displayName || '';
    const awayName = away.team?.displayName || '';
    const status = parseStatus(comp);
    const homeScore = home.score ?? null;
    const awayScore = away.score ?? null;

    nextState[ev.id] = { status, homeScore, awayScore };

    if (!isFirstLoad && notifyEnabled) {
      const prev = prevMatchState[ev.id];
      if (prev) {
        // kickoff: sched -> live
        if (prev.status === 'sched' && status === 'live') {
          sendNotification('⚽ 開賽',
            `${matchLabel(homeName, awayName)} 比賽開始了！`);
        }
        // full time: live -> final
        if (prev.status === 'live' && status === 'final') {
          sendNotification('🏁 完場',
            `${matchLabel(homeName, awayName)}　最終比分 ${homeScore} - ${awayScore}`);
        }
        // goal: score changed while live
        if (status === 'live' && prev.status === 'live') {
          const prevH = Number(prev.homeScore ?? 0), prevA = Number(prev.awayScore ?? 0);
          const curH  = Number(homeScore ?? 0),      curA  = Number(awayScore ?? 0);
          if (curH > prevH || curA > prevA) {
            sendNotification('⚽ 進球！',
              `${matchLabel(homeName, awayName)}　目前比分 ${homeScore} - ${awayScore}`);
          }
        }
      }
    }
  }

  prevMatchState = nextState;
}


  const type  = comp.status?.type?.name  || '';
  const state = comp.status?.type?.state || '';
  const completed = comp.status?.type?.completed === true;

  if (LIVE_STATUSES.has(type) || state === 'in') return 'live';
  if (completed || FINAL_STATUSES.has(type) || state === 'post') return 'final';
  return 'sched';
}

// ── TAB SWITCH ───────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', ['matches','standings','bracket'][i] === tab);
  });
  ['matches','standings','bracket'].forEach(t => {
    document.getElementById('tab-'+t).style.display = t === tab ? '' : 'none';
  });
  if (tab === 'standings') loadStandings();
  if (tab === 'bracket')   loadBracket();
}

// ── LOAD MATCHES ─────────────────────────────────────────
async function loadMatches(manual = false) {
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('spinning');

  try {
    const dates = generateDateRange();
    const results = await Promise.all(
      dates.map(d => fetch(`${ESPN_SCORES}?dates=${d}&limit=50`).then(r=>r.json()).catch(()=>null))
    );
    allEvents = [];
    for (const data of results) {
      if (data?.events) allEvents.push(...data.events);
    }
    // dedup
    const seen = new Set();
    allEvents = allEvents.filter(e => { if(seen.has(e.id)) return false; seen.add(e.id); return true; });
    allEvents.sort((a,b) => new Date(a.date)-new Date(b.date));

    detectChangesAndNotify(allEvents);
    renderMatches();
    document.getElementById('update-time').textContent =
      '最後更新：' + new Date().toLocaleString('zh-TW', {hour12: false});
  } catch(err) {
    document.getElementById('matches-content').innerHTML =
      `<div class="loader" style="color:var(--red)">無法取得資料，請稍後重試</div>`;
  } finally {
    btn.classList.remove('spinning');
  }

  clearTimeout(refreshTimer);
  refreshTimer = setTimeout(loadMatches, REFRESH_MS);
}

function generateDateRange() {
  const dates = [], start = new Date('2026-06-11'), end = new Date('2026-07-19');
  for (let d = new Date(start); d <= end; d.setDate(d.getDate()+1))
    dates.push(d.toISOString().slice(0,10).replace(/-/g,''));
  return dates;
}

function renderMatches() {
  const content = document.getElementById('matches-content');
  if (!allEvents.length) { content.innerHTML = `<div class="loader">尚無賽程資料</div>`; return; }

  const byDate = {};
  for (const ev of allEvents) {
    const d = new Date(ev.date).toLocaleDateString('zh-TW', {
      timeZone:'Asia/Taipei', year:'numeric', month:'long', day:'numeric', weekday:'short'
    });
    if (!byDate[d]) byDate[d] = [];
    byDate[d].push(ev);
  }

  let html = '';
  for (const [date, evs] of Object.entries(byDate)) {
    html += `<div class="date-section">
      <div class="section-label">
        <span class="section-label-text">${date}</span>
        <span class="section-label-line"></span>
      </div>
      <div class="matches-grid">`;
    for (const ev of evs) html += renderCard(ev);
    html += `</div></div>`;
  }
  content.innerHTML = html;
}

function renderCard(ev) {
  const comp = ev.competitions?.[0];
  if (!comp) return '';
  const home = comp.competitors?.find(c=>c.homeAway==='home') || comp.competitors?.[0];
  const away = comp.competitors?.find(c=>c.homeAway==='away') || comp.competitors?.[1];
  if (!home||!away) return '';

  const homeName = home.team?.displayName || '—';
  const awayName = away.team?.displayName || '—';
  const hi = teamInfo(homeName), ai = teamInfo(awayName);

  const status = parseStatus(comp);
  const isLive = status === 'live';
  const isFinal = status === 'final';

  const homeScore = home.score ?? null;
  const awayScore = away.score ?? null;
  const hasScore = homeScore !== null && awayScore !== null;

  const statusClass = isLive ? 'status-live' : isFinal ? 'status-ft' : 'status-sched';
  const statusLabel = isLive
    ? `<span class="live-dot" style="display:inline-block;width:5px;height:5px;background:var(--red);border-radius:50%;margin-right:4px;animation:blink 1.4s infinite"></span>直播中`
    : isFinal ? '完場' : '待賽';

  const kickoff = new Date(ev.date).toLocaleTimeString('zh-TW', {
    timeZone:'Asia/Taipei', hour:'2-digit', minute:'2-digit', hour12:false
  });

  const venue = comp.venue?.fullName || '';
  const groupNote = ev.notes?.find(n=>n.type==='rotation')?.headline
    || ev.notes?.find(n=>n.headline)?.headline
    || '';

  const cardClass = ['match-card', isLive?'live-card':'', isFinal?'final-card':''].filter(Boolean).join(' ');

  const scoreHTML = hasScore
    ? `<div class="score">${homeScore}</div><div class="score-sep">—</div><div class="score">${awayScore}</div>`
    : `<div class="score-tbd">vs</div>`;

  return `
  <div class="${cardClass}">
    <div class="card-top">
      <div class="group-tag">${groupNote || ev.name || ''}</div>
      <div class="match-status ${statusClass}">${statusLabel}</div>
    </div>
    <div class="teams-row">
      <div class="team">
        ${flagImg(homeName, hi.code, 'card')}
        <div class="team-name-en">${homeName}</div>
        ${hi.zh ? `<div class="team-name-zh">${hi.zh}</div>` : ''}
      </div>
      <div class="score-box">${scoreHTML}</div>
      <div class="team">
        ${flagImg(awayName, ai.code, 'card')}
        <div class="team-name-en">${awayName}</div>
        ${ai.zh ? `<div class="team-name-zh">${ai.zh}</div>` : ''}
      </div>
    </div>
    <div class="card-bottom">
      <div class="match-time">${kickoff} 台北時間</div>
      <div class="match-venue">${venue}</div>
    </div>
  </div>`;
}

// ── STANDINGS ────────────────────────────────────────────
async function loadStandings() {
  try {
    const res = await fetch(ESPN_STANDINGS);
    const data = await res.json();
    renderStandings(data.children || []);
  } catch {
    document.getElementById('standings-content').innerHTML =
      `<div class="loader" style="color:var(--red)">積分榜暫時無法取得</div>`;
  }
}

function renderStandings(children) {
  const el = document.getElementById('standings-content');
  if (!children?.length) {
    el.innerHTML = `<div class="loader">積分榜尚未更新</div>`; return;
  }
  let html = '<div class="standings-container">';
  for (const group of children) {
    const name = group.name || '組別';
    const entries = group.standings?.entries || [];
    if (!entries.length) continue;

    html += `<div class="date-section">
      <div class="section-label">
        <span class="section-label-text">${name}</span>
        <span class="section-label-line"></span>
      </div>
    </div>
    <table class="standings-table">
      <thead><tr>
        <th style="text-align:left">#　隊伍</th>
        <th>賽</th><th>勝</th><th>平</th><th>負</th>
        <th>進球</th><th>失球</th><th>得失球</th><th>積分</th>
      </tr></thead><tbody>`;

    entries.forEach((entry, i) => {
      const name = entry.team?.displayName || '—';
      const info = teamInfo(name);
      const stats = {};
      for (const s of (entry.stats||[])) stats[s.name] = s.value;
      const gd = stats.pointDifferential ?? stats.goalDifference ?? 0;
      const gdClass = gd > 0 ? 'gd-pos' : gd < 0 ? 'gd-neg' : '';
      const rowClass = i < 2 ? 'qualify-row' : i === 2 ? 'qualify3-row' : '';

      html += `<tr class="${rowClass}">
        <td><div class="team-cell">
          <span class="rank-num">${i+1}</span>
          ${info.code ? `<div class="cell-flag"><img src="https://flagcdn.com/w40/${info.code}.png" alt="${name}" loading="lazy"></div>` : ''}
          <div class="team-name-cell">
            <span class="cell-en">${name}</span>
            ${info.zh ? `<span class="cell-zh">${info.zh}</span>` : ''}
          </div>
        </div></td>
        <td>${stats.gamesPlayed ?? 0}</td>
        <td>${stats.wins ?? 0}</td>
        <td>${stats.ties ?? stats.draws ?? 0}</td>
        <td>${stats.losses ?? 0}</td>
        <td>${stats.pointsFor ?? stats.goalsFor ?? 0}</td>
        <td>${stats.pointsAgainst ?? stats.goalsAgainst ?? 0}</td>
        <td class="${gdClass}">${gd > 0 ? '+'+gd : gd}</td>
        <td class="pts-cell">${stats.points ?? 0}</td>
      </tr>`;
    });
    html += `</tbody></table>`;
  }
  html += '</div>';
  el.innerHTML = html;
}

// ── BRACKET ─────────────────────────────────────────────
async function loadBracket() {
  const el = document.getElementById('bracket-content');
  const knockout = allEvents.filter(ev => {
    const name = (ev.name||'').toLowerCase();
    const notes = (ev.notes||[]).map(n=>(n.headline||'').toLowerCase()).join(' ');
    return name.includes('round')||name.includes('quarter')||name.includes('semi')
      ||name.includes('final')||notes.includes('knockout');
  });
  if (!knockout.length) {
    el.innerHTML = `<div class="loader" style="line-height:2">
      淘汰賽將於 6 月 28 日開始<br>
      <span style="font-size:11px;color:var(--text3)">Round of 32 → Round of 16 → 八強 → 四強 → 決賽</span>
    </div>`; return;
  }
  let html = '<div class="matches-grid">';
  for (const ev of knockout) html += renderCard(ev);
  html += '</div>';
  el.innerHTML = html;
}

// ── JUMP TO NEXT MATCH ───────────────────────────────────
function jumpToNextMatch() {
  // Switch to matches tab first
  switchTab('matches');

  // Find the first scheduled (upcoming) match card
  setTimeout(() => {
    const cards = document.querySelectorAll('.match-card');
    for (const card of cards) {
      const statusEl = card.querySelector('.match-status');
      if (statusEl && statusEl.textContent.trim() === '待賽') {
        card.scrollIntoView({ behavior: 'smooth', block: 'center' });
        // brief highlight flash
        card.style.transition = 'border-color .3s';
        card.style.borderColor = 'var(--gold)';
        setTimeout(() => { card.style.borderColor = ''; }, 1200);
        return;
      }
    }
  }, 100);
}
